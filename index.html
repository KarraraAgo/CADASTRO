<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Cadastro de Alunos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Sistema de Cadastro de Alunos</h1>
    <p>Gerencie alunos de forma simples</p>
  </header>

  <section>
    <h2>Cadastrar Aluno</h2>

    <form id="formAluno">
      <input type="text" id="nome" placeholder="Nome" required>
      <input type="number" id="idade" placeholder="Idade" required>
      <input type="number" id="nota" placeholder="Nota" required>
      <button type="submit">Cadastrar</button>
    </form>
  </section>

  <section>
    <h2>Lista de Alunos</h2>

    <table border="1">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Idade</th>
          <th>Nota</th>
          <th>Ação</th>
        </tr>
      </thead>
      <tbody id="tabelaAlunos"></tbody>
    </table>
  </section>

  <section>
    <h2>Sobre</h2>
    <p>Este sistema foi desenvolvido para gerenciar alunos.</p>

    <ul>
      <li>Cadastro simples</li>
      <li>Remoção de alunos</li>
      <li>Interface amigável</li>
    </ul>

    <a href="https://www.google.com" target="_blank">Saiba mais</a>

    <br><br>

   

   

    <h3>Localização</h3>
    <iframe 
      src="https://www.google.com/maps/embed" 
      width="300" height="200">
    </iframe>
  </section>

  <script src="script.js"></script>
</body>
</html>
